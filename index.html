  .meal-label{font-size:15px;font-weight:700;color:#888;}

  .meal-macros .kcal{font-size:12px;color:#4f8fff;}
  .meal-macros .custom-tag{font-size:10px;color:#6060a0;margin-right:4px;}
  .meal-macros .not-set{font-size:11px;color:#333;}
  .meal-arrow{font-size:14px;color:#333;margin-top:2px;}

  .option{padding:12px 14px;border-radius:10px;background:#090916;border:1px solid #161630;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:all 0.15s;}

  .option-nums{text-align:right;min-width:70px;}

  .option-kcal{font-size:11px;color:#4f8fff;margin-top:1px;}

  .custom-form-title{font-size:12px;color:#6060a0;font-weight:600;letter-spacing:1px;text-transform:uppercase;}

  .custom-error{font-size:11px;color:#ff6060;padding:6px 10px;background:#1a0a0a;border-radius:6px;}

  .summary-cell{padding:14px;background:#090914;border-radius:10px;border:1px solid #161628;}

  .summary-cell-val{font-size:24px;font-weight:800;font-family:'Bebas Neue',cursive;letter-spacing:1px;}

  {keys:["anjeer milk","fig milk"],p:4.5,c:120,name:"Anjeer Milk",unitG:250},
  {keys:["atta laddoo","whole wheat ladoo"],p:7.5,c:430,name:"Atta Ladoo",unitG:40},
  {keys:["mathura peda"],p:8.0,c:420,name:"Mathura Peda",unitG:30},
  {keys:["soan papdi","son papdi"],p:5.5,c:465,name:"Soan Papdi",unitG:30},
  {keys:["balushahi"],p:4.5,c:490,name:"Balushahi",unitG:40},
  {keys:["imarti","amriti"],p:2.0,c:395,name:"Imarti",unitG:50},
  {keys:["thanda","cold drink","coca cola","pepsi","soda"],p:0,c:42,name:"Cold Drink/Soda",unitG:300},
  {keys:["energy drink","red bull"],p:0.7,c:45,name:"Energy Drink",unitG:250},
  {keys:["electrolyte water","ors","electral"],p:0,c:15,name:"ORS/Electrolyte Water",unitG:200},

  // ══ COOKING BASES (per tbsp/common usage) ══
  {keys:["tomato onion gravy","onion tomato masala","base gravy"],p:1.5,c:65,name:"Onion Tomato Base",unitG:50},
  {keys:["cashew gravy","cashew paste"],p:5.0,c:180,name:"Cashew Paste/Gravy",unitG:30},
  {keys:["coconut gravy","nariyal gravy"],p:2.0,c:160,name:"Coconut Gravy",unitG:50},

];
const NUM_WORDS={one:1,two:2,three:3,four:4,five:5,six:6,half:0.5,a:1,an:1};

function extractQty(text,idx){
  const before=text.slice(Math.max(0,idx-35),idx);
  const after=text.slice(idx,idx+40);
  let m;
  m=before.match(/(\d+\.?\d*)\s*(g|ml|l|kg|scoop|cup|tbsp|tsp|glass|bowl)s?\s*$/i);
  if(m) return{qty:parseFloat(m[1]),unit:m[2].toLowerCase()};
  m=before.match(/\b(one|two|three|four|five|six|half|an?)\s+(scoop|cup|tbsp|glass|bowl)?\s*$/i);
  if(m) return{qty:NUM_WORDS[m[1].toLowerCase()]||1,unit:m[2]?m[2].toLowerCase():"count"};
  m=before.match(/(\d+\.?\d*)\s*$/);
  if(m) return{qty:parseFloat(m[1]),unit:"count"};
  m=after.match(/^[a-z\s]*x?\s*(\d+)/i);
  if(m) return{qty:parseFloat(m[1]),unit:"count"};
  return{qty:1,unit:"count"};
}
function unitToGrams(qty,unit,food){
  const u=(unit||"").toLowerCase();
  if(u==="g") return qty;
  if(u==="kg") return qty*1000;
  if(u==="ml") return qty;
  if(u==="l") return qty*1000;
  if(u==="scoop") return qty*(food.unitG||30);
  if(u==="cup") return qty*240;
  if(u==="tbsp") return qty*15;
  if(u==="tsp") return qty*5;
  if(u==="glass") return qty*250;
  if(u==="bowl") return qty*300;
  return qty*(food.unitG||100);
}
function parseCustomMeal(text){
  const lower=text.toLowerCase();
  const breakdown=[];
  const matched=new Set();
  for(const food of NUTRITION_DB){
    for(const key of food.keys){
      const idx=lower.indexOf(key);
      if(idx!==-1&&!matched.has(food.name)){
        matched.add(food.name);
        const{qty,unit}=extractQty(lower,idx);
        const grams=unitToGrams(qty,unit,food);
        const protein=Math.round((food.p*grams)/100);
        const calories=Math.round((food.c*grams)/100);
        breakdown.push({item:`${food.name} (~${Math.round(grams)}g)`,protein,calories});
        break;
      }
    }
  }
  if(breakdown.length===0) throw new Error("No foods recognised. Try: '40g oats, 440ml milk, 1 scoop whey'");
  return{protein:breakdown.reduce((s,i)=>s+i.protein,0),calories:breakdown.reduce((s,i)=>s+i.calories,0),breakdown};
}

// --- State ---
let selected={}, customMacros={}, expandedId="morning", loggingCustom=null;

function loadState(){
  try{
    const today=new Date().toDateString();
    const savedDate=localStorage.getItem("dp_date");
    if(savedDate&&savedDate!==today){
      localStorage.removeItem("dp_selected");
      localStorage.removeItem("dp_custom");
    }
    localStorage.setItem("dp_date",today);
    const s=localStorage.getItem("dp_selected");
    const c=localStorage.getItem("dp_custom");
    selected=s?JSON.parse(s):{};
    customMacros=c?JSON.parse(c):{};
  }catch(e){selected={};customMacros={};}
}
function saveState(){
  try{
    localStorage.setItem("dp_selected",JSON.stringify(selected));
    localStorage.setItem("dp_custom",JSON.stringify(customMacros));
  }catch(e){}
}

function getMacros(items){
  return items.reduce((acc,id)=>{
    const f=FOODS[id]; if(!f) return acc;
    return{protein:acc.protein+f.protein,calories:acc.calories+f.calories};
  },{protein:0,calories:0});
}
function getTotals(){
  let p=0,c=0;
  for(const[mealId,val] of Object.entries(selected)){
    if(val==="__custom__"){
      const cm=customMacros[mealId];
      if(cm){p+=cm.protein;c+=cm.calories;}
    } else {
      const m=getMacros(val);
      p+=m.protein; c+=m.calories;
    }
  }
  return{protein:Math.round(p),calories:Math.round(c)};
}

// --- Render ---
function render(){
  const totals=getTotals();
  updateHeader(totals);
  renderMeals();
  renderSummary(totals);
}

function updateHeader(totals){
  const{protein,calories}=totals;
  // rings
  const kPct=Math.min(calories/CALORIE_TARGET,1);
  const pPct=Math.min(protein/PROTEIN_TARGET,1);
  document.getElementById("arc-kcal").setAttribute("stroke-dasharray",`${kPct*CIRC} ${CIRC}`);
  document.getElementById("arc-kcal").setAttribute("stroke",calories>CALORIE_TARGET?"#ff4d4d":"#4f8fff");
  document.getElementById("arc-prot").setAttribute("stroke-dasharray",`${pPct*CIRC} ${CIRC}`);
  document.getElementById("val-kcal").textContent=calories;
  document.getElementById("val-kcal").style.color=calories>CALORIE_TARGET?"#ff4d4d":"#4f8fff";
  document.getElementById("val-prot").textContent=protein;
  // status
  let msg,color;
  if(calories===0){msg="Start selecting your meals";color="#555";}
  else if(calories>CALORIE_TARGET){msg="⚠️ Over calorie limit!";color="#ff4d4d";}
  else if(protein>=PROTEIN_TARGET&&calories<=CALORIE_TARGET&&calories>=CALORIE_MIN){msg="✅ Perfect. Hit protein, in deficit.";color="#00ff88";}
  else if(protein<PROTEIN_TARGET){msg=`Need ${PROTEIN_TARGET-protein}g more protein`;color="#ffd700";}
  else if(calories<CALORIE_MIN){msg="Too low on calories";color="#ff9500";}
  else{msg="Keep building your day";color="#aaa";}
  const sb=document.getElementById("status-bar");
  sb.style.borderColor=color+"33";
  document.getElementById("status-msg").textContent=msg;
  document.getElementById("status-msg").style.color=color;
  document.getElementById("status-right").textContent=`${protein}g · ${calories} kcal`;
}

function renderMeals(){
  const container=document.getElementById("meals");
  container.innerHTML="";

  MEALS.forEach(meal=>{
    const isOpen=expandedId===meal.id;
    const chosen=selected[meal.id];
    const isCustom=chosen==="__custom__";
    const cm=isCustom?customMacros[meal.id]:null;
    const macros=chosen&&!isCustom?getMacros(chosen):null;
    const displayMacros=isCustom?cm:macros;

    const card=document.createElement("div");
    card.className="meal-card"+(isOpen?" open":"")+(chosen?" chosen":"");

    // Header
    const hdr=document.createElement("div");
    hdr.className="meal-header";
    hdr.innerHTML=`
      <div style="display:flex;align-items:center">
        <span class="meal-icon">${meal.icon}</span>
        <div>
          <div class="meal-label${chosen?" active":""}">${meal.label}</div>
          <div class="meal-time">${meal.time}</div>
        </div>
      </div>
      <div class="meal-macros">
        ${displayMacros
          ? `${isCustom?'<span class="custom-tag">custom</span>':''}<span class="prot">${displayMacros.protein}g</span><span style="color:#444;margin:0 4px;font-size:11px">·</span><span class="kcal">${displayMacros.calories} kcal</span>`
          : '<span class="not-set">not set</span>'}
        <div class="meal-arrow">${isOpen?"▲":"▼"}</div>
      </div>`;
    hdr.onclick=()=>{expandedId=isOpen?null:meal.id; loggingCustom=null; render();};
    card.appendChild(hdr);

    if(isOpen){
      const opts=document.createElement("div");
      opts.className="meal-options";

      // Preset options
      meal.options.forEach(opt=>{
        const m=getMacros(opt.items);
        const isSel=!isCustom&&chosen&&JSON.stringify(chosen)===JSON.stringify(opt.items);
        const div=document.createElement("div");
        div.className="option"+(isSel?" selected":"");
        div.innerHTML=`
          <div style="flex:1;margin-right:12px">
            <div class="option-name">${opt.name}</div>
            <div class="option-tags">${opt.items.map(id=>`<span class="option-tag">${FOODS[id]?.name}</span>`).join("")}</div>
          </div>
          <div class="option-nums">
            <div class="option-prot">${m.protein}g</div>
            <div class="option-kcal">${m.calories} kcal</div>
          </div>`;
        div.onclick=()=>{
          loggingCustom=null;
          if(isSel) delete selected[meal.id];
          else selected[meal.id]=opt.items;
          saveState(); render();
        };
        opts.appendChild(div);
      });

      // Custom log
      if(loggingCustom===meal.id){
        opts.appendChild(buildCustomForm(meal.id));
      } else {
        const cbtn=document.createElement("div");
        cbtn.className="custom-btn"+(isCustom?" logged":"");
        const loggedLabel=isCustom?(customMacros[meal.id]?.label||"Custom logged"):"Log what I actually ate";
        cbtn.innerHTML=`
          <div>
            <div class="custom-btn-label">✏️ ${loggedLabel}</div>
            ${!isCustom?'<div class="custom-btn-hint">Type it out — macros calculated locally</div>':""}
          </div>
          ${isCustom&&cm?`<div class="option-nums"><div class="option-prot">${cm.protein}g</div><div class="option-kcal">${cm.calories} kcal</div></div>`:""}`;
        cbtn.onclick=()=>{loggingCustom=meal.id; render();};
        opts.appendChild(cbtn);
      }

      // Skip
      const skip=document.createElement("div");
      skip.className="skip-btn";
      skip.textContent="Skip this meal";
      skip.onclick=()=>{loggingCustom=null;delete selected[meal.id];saveState();render();};
      opts.appendChild(skip);

      card.appendChild(opts);
    }

    container.appendChild(card);
  });

  // Summary + reminders
  const sumDiv=document.createElement("div");
  sumDiv.id="summary";
  const totals=getTotals();
  const remaining=Math.max(0,CALORIE_TARGET-totals.calories);
  const deficit=MAINTENANCE-totals.calories;
  const cells=[
    {label:"Protein",val:`${totals.protein}g`,sub:`Target: ${PROTEIN_TARGET}g`,color:"#00e5a0",ok:totals.protein>=PROTEIN_TARGET},
    {label:"Calories",val:totals.calories,sub:`Target: ${CALORIE_TARGET}`,color:"#4f8fff",ok:totals.calories<=CALORIE_TARGET&&totals.calories>=CALORIE_MIN},
    {label:"Remaining Cal",val:remaining,sub:"calories left",color:"#ffd700",ok:true},
    {label:"Deficit",val:`${deficit} kcal`,sub:"from maintenance",color:"#ff9500",ok:true},
  ];
  sumDiv.innerHTML=`
    <div class="summary-title">Day Summary</div>
    <div class="summary-grid">
      ${cells.map(c=>`
        <div class="summary-cell">
          <div class="summary-cell-label">${c.label}</div>
          <div class="summary-cell-val" style="color:${c.ok?c.color:"#ff4d4d"}">${c.val}</div>
          <div class="summary-cell-sub">${c.sub}</div>
        </div>`).join("")}
    </div>
    <button id="reset-btn">Reset Day</button>`;
  container.appendChild(sumDiv);
  document.getElementById("reset-btn").onclick=()=>{
    selected={};customMacros={};loggingCustom=null;saveState();render();
  };

  const rem=document.createElement("div");
  rem.id="reminders";
  rem.innerHTML=`<div class="rem-title">Reminders</div>
    🥛 Switch to cow milk — saves ~120 kcal vs buffalo<br>
    🥚 Boil eggs only, eat mornings, pair with milk/curd<br>
    🥜 Max 1 tbsp PB on cut — mostly fat<br>
    💧 3L+ water daily<br>
    ⚡ Creatine 5g with any meal — not counted here`;
  container.appendChild(rem);
}

function buildCustomForm(mealId){
  const wrap=document.createElement("div");
  wrap.className="custom-form";
  // Tab state
  let activeTab = 'text';

  wrap.innerHTML=`
    <div class="custom-form-title">✏️ Log what you actually ate</div>
    <div class="custom-tabs">
      <button class="custom-tab active" id="tab-text">Describe Food</button>
      <button class="custom-tab" id="tab-manual">Enter Manually</button>
    </div>

    <div id="panel-text">
      <textarea id="custom-input" placeholder="e.g. 40g oats, 440ml milk, one scoop whey"></textarea>
      <div id="custom-error" style="display:none" class="custom-error"></div>
      <div id="custom-result" style="display:none" class="custom-result">
        <div class="custom-result-top">
          <div><span class="custom-result-prot" id="res-prot">0</span><span class="custom-result-unit">protein</span></div>
          <div><span class="custom-result-kcal" id="res-kcal">0</span><span class="custom-result-unit">kcal</span></div>
        </div>
        <div id="res-breakdown"></div>
      </div>
      <div class="custom-btns">
        <button class="btn-analyse" id="btn-analyse">Analyse</button>
        <button class="btn-cancel" id="btn-cancel-text">Cancel</button>
      </div>
    </div>

    <div id="panel-manual" style="display:none">
      <div class="manual-label">What did you eat? (for your reference)</div>
      <input id="manual-name" type="text" placeholder="e.g. Dadi ke haath ka khaana" class="manual-input"/>
      <div class="manual-row">
        <div class="manual-field">
          <div class="manual-label">Protein (g)</div>
          <input id="manual-protein" type="number" min="0" max="200" placeholder="0" class="manual-input"/>
        </div>
        <div class="manual-field">
          <div class="manual-label">Calories (kcal)</div>
          <input id="manual-calories" type="number" min="0" max="5000" placeholder="0" class="manual-input"/>
        </div>
      </div>
      <div class="custom-btns" style="margin-top:10px">
        <button class="btn-save" id="btn-manual-save">✓ Save This</button>
        <button class="btn-cancel" id="btn-cancel-manual">Cancel</button>
      </div>
    </div>`;

  // Tab switching
  wrap.querySelector("#tab-text").onclick=()=>{
    activeTab='text';
    wrap.querySelector("#tab-text").classList.add("active");
    wrap.querySelector("#tab-manual").classList.remove("active");
    wrap.querySelector("#panel-text").style.display="block";
    wrap.querySelector("#panel-manual").style.display="none";
  };
  wrap.querySelector("#tab-manual").onclick=()=>{
    activeTab='manual';
    wrap.querySelector("#tab-manual").classList.add("active");
    wrap.querySelector("#tab-text").classList.remove("active");
    wrap.querySelector("#panel-text").style.display="none";
    wrap.querySelector("#panel-manual").style.display="block";
  };

  let parsed=null;

  wrap.querySelector("#btn-analyse").onclick=()=>{
    const text=wrap.querySelector("#custom-input").value;
    if(!text.trim()) return;
    const errDiv=wrap.querySelector("#custom-error");
    const resDiv=wrap.querySelector("#custom-result");
    errDiv.style.display="none";
    resDiv.style.display="none";
    try{
      parsed=parseCustomMeal(text);
      wrap.querySelector("#res-prot").textContent=parsed.protein+"g";
      wrap.querySelector("#res-kcal").textContent=parsed.calories;
      wrap.querySelector("#res-breakdown").innerHTML=parsed.breakdown.map(b=>
        `<div class="breakdown-row"><span class="breakdown-name">${b.item}</span><span class="breakdown-nums">${b.protein}g · ${b.calories} kcal</span></div>`
      ).join("");
      resDiv.style.display="block";
      const ab=wrap.querySelector("#btn-analyse");
      ab.textContent="✓ Save This";
      ab.className="btn-save";
      ab.onclick=()=>{
        customMacros[mealId]={protein:parsed.protein,calories:parsed.calories,label:text.slice(0,60)};
        selected[mealId]="__custom__";
        loggingCustom=null;
        saveState(); render();
      };
    }catch(e){
      errDiv.textContent=e.message;
      errDiv.style.display="block";
    }
  };

  // Manual save
  wrap.querySelector("#btn-manual-save").onclick=()=>{
    const name=wrap.querySelector("#manual-name").value.trim()||"Manual entry";
    const protein=parseFloat(wrap.querySelector("#manual-protein").value)||0;
    const calories=parseFloat(wrap.querySelector("#manual-calories").value)||0;
    if(protein===0&&calories===0){
      alert("Enter at least protein or calories");
      return;
    }
    customMacros[mealId]={protein,calories,label:name.slice(0,60)};
    selected[mealId]="__custom__";
    loggingCustom=null;
    saveState(); render();
  };

  wrap.querySelector("#btn-cancel-text").onclick=()=>{loggingCustom=null;render();};
  wrap.querySelector("#btn-cancel-manual").onclick=()=>{loggingCustom=null;render();};
  return wrap;
}

function renderSummary(){}

// --- Init ---
loadState();
render();
</script>
